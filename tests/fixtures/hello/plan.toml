name = "hello"
version = "1.0.0"
release = 1
description = "Hello World test part"
license = "MIT"
arch = "x86_64"

[pipeline.prepare]
executor = "shell"
isolation = "strict"
script = """
cat > hello.c << 'EOF'
#include <stdio.h>
int main() { printf("Hello, wright!\\n"); return 0; }
EOF
"""

[pipeline.compile]
executor = "shell"
isolation = "strict"
script = """
gcc -o hello hello.c
"""

[pipeline.staging]
executor = "shell"
isolation = "strict"
script = """
install -Dm755 hello ${STAGING_DIR}/usr/bin/hello
"""
