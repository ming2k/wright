[plan]
name = "nginx"
version = "1.25.3"
release = 1
description = "High performance HTTP and reverse proxy server"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://nginx.org"
maintainer = "Test Maintainer <test@example.com>"

[dependencies]
runtime = [
    "openssl",
    "pcre2 >= 10.42",
    "zlib >= 1.2",
]
build = ["perl", "gcc", "make"]
optional = [
    { name = "geoip", description = "GeoIP module support" },
]

[relations]
conflicts = ["apache"]
provides = ["http-server"]

[[sources]]
uri = "https://nginx.org/download/nginx-1.25.3.tar.gz"
sha256 = "a51897b1e37e9e73e70d28b9b12c9a31779116c15a1115e3f3dd65291e26bd83"

[[sources]]
uri = "patches/fix-headers.patch"
sha256 = "SKIP"

[[sources]]
uri = "patches/add-feature.patch"
sha256 = "SKIP"

[options]
strip = true
static = false
debug = false
ccache = true

[lifecycle.prepare]
executor = "shell"
dockyard = "strict"
script = """
cd nginx-${PART_VERSION}
patch -Np1 < ${FILES_DIR}/fix-headers.patch
patch -Np1 < ${FILES_DIR}/add-feature.patch
"""

[lifecycle.configure]
executor = "shell"
dockyard = "strict"
env = { CFLAGS = "-O2 -pipe -march=x86-64", CXXFLAGS = "${CFLAGS}" }
script = """
cd nginx-${PART_VERSION}
./configure \
    --prefix=/usr \
    --sysconfdir=/etc/nginx \
    --with-http_ssl_module \
    --with-http_v2_module \
    --with-pcre-jit
"""

[lifecycle.compile]
executor = "shell"
dockyard = "strict"
env = { MAKEFLAGS = "-j${NPROC}" }
script = """
cd nginx-${PART_VERSION}
make
"""

[lifecycle.check]
executor = "shell"
dockyard = "strict"
script = """
cd nginx-${PART_VERSION}
make test
"""

[lifecycle.staging]
executor = "shell"
dockyard = "strict"
script = """
cd nginx-${PART_VERSION}
make DESTDIR=${PART_DIR} install
install -Dm644 conf/nginx.conf ${PART_DIR}/etc/nginx/nginx.conf
"""

[lifecycle.part.nginx]
hooks.pre_install = """
echo "Preparing nginx installation..."
"""
hooks.post_install = """
useradd -r -s /sbin/nologin -d /var/lib/nginx nginx 2>/dev/null || true
"""
hooks.post_upgrade = """
systemctl reload nginx 2>/dev/null || true
"""
hooks.pre_remove = """
systemctl stop nginx 2>/dev/null || true
"""
backup = [
    "/etc/nginx/nginx.conf",
    "/etc/nginx/mime.types",
]

[lifecycle.part.nginx-doc]
description = "Nginx documentation files"
script = """
cd nginx-${PART_VERSION}
install -d ${PART_DIR}/usr/share/doc/nginx
install -Dm644 README ${PART_DIR}/usr/share/doc/nginx/README
install -Dm644 LICENSE ${PART_DIR}/usr/share/doc/nginx/LICENSE
"""
