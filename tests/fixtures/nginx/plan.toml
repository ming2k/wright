name = "nginx"
version = "1.25.3"
release = 1
description = "High performance HTTP and reverse proxy server"
license = "BSD-2-Clause"
arch = "x86_64"
url = "https://nginx.org"
maintainer = "Test Maintainer <test@example.com>"

build = ["perl", "gcc", "make"]
link = ["openssl", "pcre2 >= 10.42", "zlib >= 1.2"]

[[sources]]
type = "http"
url = "https://nginx.org/download/nginx-${VERSION}.tar.gz"
sha256 = "a51897b1e37e9e73e70d28b9b12c9a31779116c15a1115e3f3dd65291e26bd83"

[[sources]]
type = "local"
path = "patches/fix-headers.patch"

[[sources]]
type = "local"
path = "patches/add-feature.patch"

[options]
static = false
debug = false
ccache = true

[lifecycle.prepare]
executor = "shell"
isolation = "strict"
script = """
cd ${WORKDIR}
patch -Np1 < ${WORKDIR}/fix-headers.patch
patch -Np1 < ${WORKDIR}/add-feature.patch
"""

[lifecycle.configure]
executor = "shell"
isolation = "strict"
env = { CFLAGS = "-O2 -pipe -march=x86-64", CXXFLAGS = "${CFLAGS}" }
script = """
cd ${WORKDIR}
./configure \
    --prefix=/usr \
    --sysconfdir=/etc/nginx \
    --with-http_ssl_module \
    --with-http_v2_module \
    --with-pcre-jit
"""

[lifecycle.compile]
executor = "shell"
isolation = "strict"
env = { MAKEFLAGS = "-j${NPROC}" }
script = """
cd ${WORKDIR}
make
"""

[lifecycle.check]
executor = "shell"
isolation = "strict"
script = """
cd ${WORKDIR}
make test
"""

[lifecycle.staging]
executor = "shell"
isolation = "strict"
script = """
cd ${WORKDIR}
make DESTDIR=${STAGING_DIR} install
install -Dm644 conf/nginx.conf ${STAGING_DIR}/etc/nginx/nginx.conf
"""
[[output]]
name = "nginx"
conflicts = ["apache"]
provides = ["http-server"]
runtime_deps = ["openssl", "pcre2 >= 10.42", "zlib >= 1.2"]
backup = [
    "/etc/nginx/nginx.conf",
    "/etc/nginx/mime.types",
]

[output.hooks]
pre_install = """
echo "Preparing nginx installation..."
"""
post_install = """
useradd -r -s /sbin/nologin -d /var/lib/nginx nginx 2>/dev/null || true
"""
post_upgrade = """
systemctl reload nginx 2>/dev/null || true
"""
pre_remove = """
systemctl stop nginx 2>/dev/null || true
"""

[[output]]
name = "nginx-doc"
description = "Nginx documentation files"
include = [
    "/usr/share/doc/.*",
]
